<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Google Calendar Widget</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: transparent;
      font-family: 'Segoe UI', sans-serif;
    }
    .calendar-container {
      width: 100%;
      height: 100vh;
      border-radius: 12px;
      overflow: hidden;
      box-shadow: 0 4px 20px rgba(0,0,0,0.1);
    }
    iframe {
      width: 100%;
      height: 100%;
      border: none;
      border-radius: 12px;
    }
  </style>
</head>
<body>
  <div class="calendar-container">
    <iframe
      src="https://calendar.google.com/calendar/embed?src=https://calendar.google.com/calendar/u/0?cid=bXRzd29ya3MyMDI0QGdtYWlsLmNvbQ&ctz=Asia%2FSeoul&mode=MONTH&showTitle=0&showNav=1&showDate=1&showPrint=0&showTabs=0&showCalendars=0&showTz=0&bgcolor=%23ffffff"
      frameborder="0"
      scrolling="no"
      allowtransparency="true">
    </iframe>
  </div>
</body>
</html>
