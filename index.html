<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Google Calendar Widget</title>

  <!-- FullCalendar CSS -->
  <link href="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.10/index.global.min.css" rel="stylesheet"/>

  <style>
    :root {
      --primary: #4285F4;
      --danger:  #EA4335;
      --success: #34A853;
      --bg:      #ffffff;
      --text:    #333333;
      --border:  #e0e0e0;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Segoe UI', 'Apple SD Gothic Neo', sans-serif;
      background: var(--bg);
      color: var(--text);
      padding: 16px;
    }

    /* ── 툴바 ── */
    #toolbar {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 12px;
      flex-wrap: wrap;
    }

    #auth-btn {
      padding: 8px 16px;
      background: var(--primary);
      color: #fff;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-size: 13px;
      font-weight: 600;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    #auth-btn:hover { opacity: 0.88; }

    #add-btn {
      padding: 8px 16px;
      background: var(--success);
      color: #fff;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-size: 13px;
      font-weight: 600;
      display: none;
    }

    #add-btn:hover { opacity: 0.88; }

    #status-msg {
      font-size: 12px;
      color: #666;
      margin-left: auto;
    }

    /* ── 캘린더 ── */
    #calendar {
      border-radius: 10px;
      overflow: hidden;
      border: 1px solid var(--border);
    }

    /* ── 모달 ── */
    .modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.45);
      z-index: 1000;
      align-items: center;
      justify-content: center;
    }

    .modal-overlay.open { display: flex; }

    .modal {
      background: #fff;
      border-radius: 12px;
      padding: 24px;
      width: 90%;
      max-width: 420px;
      box-shadow: 0 8px 40px rgba(0,0,0,0.18);
    }

    .modal h3 {
      font-size: 16px;
      margin-bottom: 16px;
      color: var(--primary);
    }

    .form-group {
      margin-bottom: 12px;
    }

    .form-group label {
      display: block;
      font-size: 12px;
      font-weight: 600;
      color: #555;
      margin-bottom: 4px;
    }

    .form-group input,
    .form-group textarea {
      width: 100%;
      padding: 8px 10px;
      border: 1px solid var(--border);
      border-radius: 6px;
      font-size: 13px;
      outline: none;
      transition: border-color .2s;
    }

    .form-group input:focus,
    .form-group textarea:focus {
      border-color: var(--primary);
    }

    .modal-actions {
      display: flex;
      gap: 8px;
      justify-content: flex-end;
      margin-top: 16px;
    }

    .btn-cancel {
      padding: 7px 16px;
      border: 1px solid var(--border);
      border-radius: 6px;
      background: #fff;
      cursor: pointer;
      font-size: 13px;
    }

    .btn-save {
      padding: 7px 16px;
      border: none;
      border-radius: 6px;
      background: var(--primary);
      color: #fff;
      cursor: pointer;
      font-size: 13px;
      font-weight: 600;
    }

    .btn-delete {
      padding: 7px 16px;
      border: none;
      border-radius: 6px;
      background: var(--danger);
      color: #fff;
      cursor: pointer;
      font-size: 13px;
      font-weight: 600;
      margin-right: auto;
    }
  </style>
</head>
<body>

<!-- 툴바 -->
<div id="toolbar">
  <button id="auth-btn" onclick="handleAuth()">🔑 구글 로그인</button>
  <button id="add-btn"  onclick="openAddModal()">＋ 이벤트 추가</button>
  <span  id="status-msg">로그인 후 캘린더를 사용할 수 있습니다.</span>
</div>

<!-- 캘린더 -->
<div id="calendar"></div>

<!-- 이벤트 추가/수정 모달 -->
<div class="modal-overlay" id="modal-overlay">
  <div class="modal">
    <h3 id="modal-title">📅 이벤트 추가</h3>

    <div class="form-group">
      <label>제목 *</label>
      <input id="ev-title" type="text" placeholder="이벤트 제목 입력"/>
    </div>
    <div class="form-group">
      <label>시작 일시 *</label>
      <input id="ev-start" type="datetime-local"/>
    </div>
    <div class="form-group">
      <label>종료 일시 *</label>
      <input id="ev-end" type="datetime-local"/>
    </div>
    <div class="form-group">
      <label>설명</label>
      <textarea id="ev-desc" rows="3" placeholder="이벤트 설명 (선택)"></textarea>
    </div>
    <div class="form-group">
      <label>장소</label>
      <input id="ev-location" type="text" placeholder="장소 (선택)"/>
    </div>

    <div class="modal-actions">
      <button class="btn-delete" id="btn-delete" onclick="deleteEvent()" style="display:none">🗑 삭제</button>
      <button class="btn-cancel" onclick="closeModal()">취소</button>
      <button class="btn-save"   onclick="saveEvent()">💾 저장</button>
    </div>
  </div>
</div>

<!-- FullCalendar JS -->
<script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.10/index.global.min.js"></script>
<!-- Google GAPI -->
<script src="https://apis.google.com/js/api.js"></script>

<script>
// ────────────────────────────────────────────
//  ✏️  여기만 본인 값으로 교체하세요
// ────────────────────────────────────────────
const CONFIG = {
  apiKey:    'AIzaSyBb7TfAi_HXTbUIOshZQpZjiQgJ7Eq8T48',
  clientId:  '421342466029-fmggvvtucrtfoogv1917fgpqmuq72su1.apps.googleusercontent.com',
  scopes:    'https://www.googleapis.com/auth/calendar',
  discovery: 'https://www.googleapis.com/discovery/v1/apis/calendar/v3/rest',
  calendarId:'primary'   // 특정 캘린더 ID도 가능
};
// ────────────────────────────────────────────

let calendar;         // FullCalendar 인스턴스
let editEventId = null; // 수정 중인 이벤트 ID
let isLoggedIn  = false;

/* ── 1. GAPI 초기화 ── */
function gapiLoaded() {
  gapi.load('client:auth2', async () => {
    await gapi.client.init({
      apiKey:         CONFIG.apiKey,
      clientId:       CONFIG.clientId,
      scopes:         CONFIG.scopes,
      discoveryDocs: [CONFIG.discovery],
    });

    // 이미 로그인된 상태 확인
    if (gapi.auth2.getAuthInstance().isSignedIn.get()) {
      onLoginSuccess();
    }

    initCalendar(); // UI는 항상 초기화
  });
}

/* ── 2. 로그인 / 로그아웃 ── */
function handleAuth() {
  if (isLoggedIn) {
    gapi.auth2.getAuthInstance().signOut().then(() => {
      isLoggedIn = false;
      document.getElementById('auth-btn').innerHTML = '🔑 구글 로그인';
      document.getElementById('add-btn').style.display = 'none';
      document.getElementById('status-msg').textContent = '로그아웃 되었습니다.';
      calendar.removeAllEvents();
    });
  } else {
    gapi.auth2.getAuthInstance().signIn().then(onLoginSuccess);
  }
}

function onLoginSuccess() {
  isLoggedIn = true;
  const user = gapi.auth2.getAuthInstance().currentUser.get()
                 .getBasicProfile().getName();
  document.getElementById('auth-btn').innerHTML = '🔓 로그아웃';
  document.getElementById('add-btn').style.display = 'block';
  document.getElementById('status-msg').textContent = `✅ ${user} 님 로그인됨`;
  if (calendar) fetchAndRenderEvents();
}

/* ── 3. FullCalendar 초기화 ── */
function initCalendar() {
  const calEl = document.getElementById('calendar');
  calendar = new FullCalendar.Calendar(calEl, {
    initialView:  'dayGridMonth',
    locale:       'ko',
    height:       'auto',
    headerToolbar: {
      left:   'prev,next today',
      center: 'title',
      right:  'dayGridMonth,timeGridWeek,listWeek'
    },
    buttonText: {
      today: '오늘', month: '월', week: '주', list: '목록'
    },
    // 날짜 클릭 → 이벤트 추가 모달
    dateClick(info) {
      if (!isLoggedIn) return alert('먼저 로그인해주세요!');
      openAddModal(info.dateStr);
    },
    // 이벤트 클릭 → 수정/삭제 모달
    eventClick(info) {
      openEditModal(info.event);
    },
    // 드래그&드롭으로 날짜 변경
    editable:     true,
    eventDrop(info) {
      if (!isLoggedIn) return info.revert();
      updateEventDate(info.event);
    },
    // 크기 조절로 시간 변경
    eventResizableFromStart: true,
    eventResize(info) {
      if (!isLoggedIn) return info.revert();
      updateEventDate(info.event);
    },
  });
  calendar.render();
}

/* ── 4. 이벤트 가져오기 (READ) ── */
async function fetchAndRenderEvents() {
  try {
    const res = await gapi.client.calendar.events.list({
      calendarId:   CONFIG.calendarId,
      timeMin:      new Date(new Date().setMonth(new Date().getMonth()-2)).toISOString(),
      timeMax:      new Date(new Date().setMonth(new Date().getMonth()+3)).toISOString(),
      singleEvents: true,
      orderBy:      'startTime',
      maxResults:   200,
    });

    calendar.removeAllEvents();
    const events = res.result.items || [];

    events.forEach(ev => {
      calendar.addEvent({
        id:    ev.id,
        title: ev.summary || '(제목 없음)',
        start: ev.start.dateTime || ev.start.date,
        end:   ev.end.dateTime   || ev.end.date,
        extendedProps: {
          description: ev.description || '',
          location:    ev.location    || '',
          googleId:    ev.id,
        },
        color: '#4285F4',
      });
    });

    document.getElementById('status-msg').textContent =
      `✅ ${events.length}개 이벤트 로드됨`;
  } catch(e) {
    console.error(e);
    document.getElementById('status-msg').textContent = '❌ 이벤트 불러오기 실패';
  }
}

/* ── 5. 이벤트 추가 (CREATE) ── */
async function createEvent(eventData) {
  try {
    const res = await gapi.client.calendar.events.insert({
      calendarId: CONFIG.calendarId,
      resource:   eventData,
    });
    calendar.addEvent({
      id:    res.result.id,
      title: res.result.summary,
      start: res.result.start.dateTime || res.result.start.date,
      end:   res.result.end.dateTime   || res.result.end.date,
      color: '#4285F4',
      extendedProps: { googleId: res.result.id },
    });
    showToast('✅ 이벤트가 추가되었습니다!');
  } catch(e) {
    showToast('❌ 이벤트 추가 실패: ' + e.result?.error?.message);
  }
}

/* ── 6. 이벤트 수정 (UPDATE) ── */
async function updateEvent(googleId, eventData) {
  try {
    await gapi.client.calendar.events.update({
      calendarId: CONFIG.calendarId,
      eventId:    googleId,
      resource:   eventData,
    });
    // FullCalendar 이벤트도 갱신
    const ev = calendar.getEventById(googleId);
    if (ev) {
      ev.setProp('title', eventData.summary);
      ev.setStart(eventData.start.dateTime);
      ev.setEnd(eventData.end.dateTime);
    }
    showToast('✅ 이벤트가 수정되었습니다!');
  } catch(e) {
    showToast('❌ 이벤트 수정 실패: ' + e.result?.error?.message);
  }
}

/* ── 7. 드래그&드롭 날짜 변경 ── */
async function updateEventDate(fcEvent) {
  const googleId = fcEvent.extendedProps.googleId;
  if (!googleId) return;
  try {
    // 기존 이벤트 데이터 조회 후 날짜만 변경 (PATCH)
    const existing = await gapi.client.calendar.events.get({
      calendarId: CONFIG.calendarId,
      eventId:    googleId,
    });
    const updated = { ...existing.result,
      start: { dateTime: fcEvent.start.toISOString(), timeZone: 'Asia/Seoul' },
      end:   { dateTime: (fcEvent.end || fcEvent.start).toISOString(), timeZone: 'Asia/Seoul' },
    };
    await gapi.client.calendar.events.update({
      calendarId: CONFIG.calendarId,
      eventId:    googleId,
      resource:   updated,
    });
    showToast('📅 날짜가 변경되었습니다!');
  } catch(e) {
    showToast('❌ 날짜 변경 실패');
    fcEvent.revert?.();
  }
}

/* ── 8. 이벤트 삭제 (DELETE) ── */
async function deleteEvent() {
  if (!editEventId) return;
  if (!confirm('정말 삭제하시겠습니까?')) return;
  try {
    await gapi.client.calendar.events.delete({
      calendarId: CONFIG.calendarId,
      eventId:    editEventId,
    });
    const ev = calendar.getEventById(editEventId);
    if (ev) ev.remove();
    closeModal();
    showToast('🗑 이벤트가 삭제되었습니다.');
  } catch(e) {
    showToast('❌ 삭제 실패: ' + e.result?.error?.message);
  }
}

/* ── 9. 모달 제어 ── */
function openAddModal(dateStr = '') {
  editEventId = null;
  document.getElementById('modal-title').textContent = '📅 이벤트 추가';
  document.getElementById('ev-title').value    = '';
  document.getElementById('ev-desc').value     = '';
  document.getElementById('ev-location').value = '';
  document.getElementById('btn-delete').style.display = 'none';

  const base = dateStr ? dateStr : toLocalDateTimeStr(new Date());
  document.getElementById('ev-start').value = base.slice(0,16);
  const endD = new Date(base);
  endD.setHours(endD.getHours()+1);
  document.getElementById('ev-end').value = toLocalDateTimeStr(endD).slice(0,16);

  document.getElementById('modal-overlay').classList.add('open');
  document.getElementById('ev-title').focus();
}

function openEditModal(fcEvent) {
  editEventId = fcEvent.extendedProps.googleId || fcEvent.id;
  document.getElementById('modal-title').textContent = '✏️ 이벤트 수정';
  document.getElementById('ev-title').value    = fcEvent.title;
  document.getElementById('ev-desc').value     = fcEvent.extendedProps.description || '';
  document.getElementById('ev-location').value = fcEvent.extendedProps.location    || '';
  document.getElementById('btn-delete').style.display = 'block';

  document.getElementById('ev-start').value = toLocalDateTimeStr(fcEvent.start).slice(0,16);
  document.getElementById('ev-end').value   = toLocalDateTimeStr(fcEvent.end || fcEvent.start).slice(0,16);

  document.getElementById('modal-overlay').classList.add('open');
}

function closeModal() {
  document.getElementById('modal-overlay').classList.remove('open');
  editEventId = null;
}

/* ── 10. 저장 (추가 or 수정 분기) ── */
function saveEvent() {
  const title = document.getElementById('ev-title').value.trim();
  const start = document.getElementById('ev-start').value;
  const end   = document.getElementById('ev-end').value;

  if (!title) return alert('제목을 입력해주세요!');
  if (!start || !end) return alert('시작/종료 시간을 입력해주세요!');
  if (new Date(start) >= new Date(end)) return alert('종료 시간이 시작 시간보다 늦어야 합니다!');

  const eventData = {
    summary:     title,
    description: document.getElementById('ev-desc').value,
    location:    document.getElementById('ev-location').value,
    start: { dateTime: new Date(start).toISOString(), timeZone: 'Asia/Seoul' },
    end:   { dateTime: new Date(end).toISOString(),   timeZone: 'Asia/Seoul' },
  };

  closeModal();

  if (editEventId) {
    updateEvent(editEventId, eventData);
  } else {
    createEvent(eventData);
  }
}

/* ── 유틸 함수 ── */
function toLocalDateTimeStr(date) {
  if (!date) return '';
  const d = new Date(date);
  d.setMinutes(d.getMinutes() - d.getTimezoneOffset());
  return d.toISOString().slice(0, 16);
}

function showToast(msg) {
  document.getElementById('status-msg').textContent = msg;
  setTimeout(() => {
    if (isLoggedIn) {
      document.getElementById('status-msg').textContent = '✅ 동기화 완료';
    }
  }, 3000);
}

// 모달 바깥 클릭 시 닫기
document.getElementById('modal-overlay').addEventListener('click', function(e) {
  if (e.target === this) closeModal();
});
</script>

<!-- GAPI 로드 완료 후 초기화 실행 -->
<script src="https://apis.google.com/js/api.js" onload="gapiLoaded()"></script>

</body>
</html>
