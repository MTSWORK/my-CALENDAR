<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>Google Calendar Widget</title>

<link href="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.10/index.global.min.css" rel="stylesheet">

<style>
body{
font-family:Segoe UI;
margin:0;
padding:10px;
background:white;
}

#calendar{
max-width:900px;
margin:auto;
}

button{
padding:8px 14px;
border:none;
border-radius:6px;
background:#4285F4;
color:white;
cursor:pointer;
}

</style>
</head>

<body>

<button onclick="handleAuth()">Google 로그인</button>

<div id="calendar"></div>

<script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.10/index.global.min.js"></script>
<script src="https://apis.google.com/js/api.js"></script>

<script>

const CONFIG = {

apiKey: "AIzaSyBb7TfAi_HXTbUIOshZQpZjiQgJ7Eq8T48",

clientId: "421342466029-fmggvvtucrtfoogv1917fgpqmuq72su1.apps.googleusercontent.com",

discoveryDocs:["https://www.googleapis.com/discovery/v1/apis/calendar/v3/rest"],

scope:"https://www.googleapis.com/auth/calendar"

};

let calendar;

function initCalendar(){

calendar = new FullCalendar.Calendar(
document.getElementById("calendar"),
{
initialView:"dayGridMonth",
locale:"ko",

events: loadEvents,

dateClick: addEvent

});

calendar.render();

}

async function loadEvents(fetchInfo, successCallback){

const response =
await gapi.client.calendar.events.list({

calendarId:"primary",

timeMin: fetchInfo.startStr,

timeMax: fetchInfo.endStr,

singleEvents:true,

orderBy:"startTime"

});

const events = response.result.items.map(e=>({

id:e.id,

title:e.summary,

start:e.start.dateTime || e.start.date,

end:e.end?.dateTime || e.end?.date

}));

successCallback(events);

}

async function addEvent(info){

const title = prompt("일정 제목");

if(!title) return;

const event = {

summary:title,

start:{date:info.dateStr},

end:{date:info.dateStr}

};

await gapi.client.calendar.events.insert({

calendarId:"primary",

resource:event

});

calendar.refetchEvents();

}

function handleAuth(){

gapi.auth2.getAuthInstance().signIn()

.then(()=>{

calendar.refetchEvents();

});

}

function initClient(){

gapi.client.init(CONFIG)

.then(()=>{

initCalendar();

});

}

gapi.load("client:auth2",initClient);

</script>

</body>
</html>
